<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitLand — Build Better Habits Daily</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 480px; padding: 48px 24px; }
        .icon { font-size: 64px; margin-bottom: 24px; }

        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a { display: block; padding: 14px 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #e5e7eb; text-decoration: none; font-size: 16px; font-weight: 500; transition: all 0.2s; }
        .links a:hover { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.3); }
        .badge { display: inline-block; margin-top: 32px; }
        .badge img { height: 48px; }
    </style>
</head>

    <div class="container">
        <div class="icon">🌱</div>
